name: Nightly

on:
  schedule:
    - cron: "0 18 */3 * *" # UTC 18:00 = 北京时间凌晨 2:00
  push:
    branches:
      - nightly

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  sync:
    name: Sync from main
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nightly
          fetch-depth: 0

      - name: Merge main into nightly
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-edit
          git push

  prepare:
    name: Prepare version
    needs: [sync]
    if: always() && (needs.sync.result == 'success' || needs.sync.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha: ${{ steps.ver.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nightly

      - name: Compute version
        id: ver
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="nightly-$(date -u +%Y%m%d)-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

  build-desktop:
    name: Desktop (${{ matrix.platform }})
    needs: [prepare]
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            platform: darwin-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            platform: darwin-amd64
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            platform: linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            platform: windows-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nightly

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build embedded opsctl
        run: go build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -o ./internal/embedded/opsctl_bin ./cmd/opsctl/

      - name: Build desktop app
        run: wails build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -tags embed_opsctl

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            tar -czf ops-cat-${{ matrix.platform }}.tar.gz -C build/bin ops-cat.app
          else
            tar -czf ops-cat-${{ matrix.platform }}.tar.gz -C build/bin ops-cat
          fi

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/ops-cat.exe -DestinationPath ops-cat-${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: nightly-ops-cat-${{ matrix.platform }}
          path: ops-cat-${{ matrix.platform }}.*

  build-opsctl:
    name: opsctl (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: [prepare]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nightly

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -o opsctl${{ matrix.ext }} ./cmd/opsctl/

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: tar -czf opsctl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz opsctl

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        run: zip opsctl-${{ matrix.goos }}-${{ matrix.goarch }}.zip opsctl.exe

      - uses: actions/upload-artifact@v4
        with:
          name: nightly-opsctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: opsctl-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    name: Update Nightly Release
    needs: [prepare, build-desktop, build-opsctl]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nightly-*
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum * > SHA256SUMS.txt

      - name: Update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly -y --cleanup-tag 2>/dev/null || true
          gh release create nightly --prerelease \
            --target ${{ needs.prepare.outputs.sha }} \
            --title "${{ needs.prepare.outputs.version }}" \
            --notes "Nightly build from \`nightly\` branch
          Commit: ${{ needs.prepare.outputs.sha }}
          Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            artifacts/*
