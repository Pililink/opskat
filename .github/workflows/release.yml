name: Release

on:
  push:
    tags:
      - "v*"

env:
  VERSION: ${{ github.ref_name }}

jobs:
  build-desktop:
    name: Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            platform: darwin-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            platform: darwin-amd64
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            platform: linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            platform: windows-amd64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build embedded opsctl
        run: go build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -o ./internal/embedded/opsctl_bin ./cmd/opsctl/

      - name: Build desktop app
        run: wails build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -tags embed_opsctl

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            tar -czf opskat-${{ matrix.platform }}.tar.gz -C build/bin opskat.app
          else
            tar -czf opskat-${{ matrix.platform }}.tar.gz -C build/bin opskat
          fi

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/opskat.exe -DestinationPath opskat-${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v7
        with:
          name: release-opskat-${{ matrix.platform }}
          path: opskat-${{ matrix.platform }}.*

  release:
    name: Create Release
    needs: [build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum * > SHA256SUMS.txt

      - name: Determine prerelease
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *-beta* ]] || [[ "${{ github.ref_name }}" == *-rc* ]]; then
            echo "flag=--prerelease" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            ${{ steps.prerelease.outputs.flag }} \
            artifacts/*
